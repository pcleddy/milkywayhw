<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milky Way Browse | Explorer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Milky Way Browse / Explorer</p>
          <h1>Free navigation, but with semantic zoom stages</h1>
        </div>
        <div class="panel copy">
          <p id="zoom-stage" class="zoom-stage"></p>
          <p id="zoom-copy" class="zoom-copy"></p>
        </div>
      </header>
      <main class="layout">
        <section class="viewport panel">
          <canvas id="scene" width="1440" height="900"></canvas>
          <div class="minimap panel">
            <canvas id="minimap" width="140" height="140"></canvas>
          </div>
        </section>
        <aside class="sidebar">
          <section class="panel">
            <p class="eyebrow">Controls</p>
            <ul>
              <li>Scroll to zoom through semantic ranges.</li>
              <li>Drag to look / pan the local frame.</li>
              <li>Use `W A S D` to move focus.</li>
            </ul>
          </section>
          <section class="panel">
            <p class="eyebrow">Stage Snap</p>
            <div id="stage-buttons" class="stage-buttons"></div>
          </section>
          <section class="panel">
            <p class="eyebrow">Landmarks</p>
            <div id="landmark-buttons" class="landmark-buttons"></div>
          </section>
        </aside>
      </main>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
