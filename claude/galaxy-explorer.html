<!DOCTYPE html>
<html>
<head>
<title>Galaxy Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050510; overflow: hidden; cursor: grab; font-family: monospace; color: #ccd; }
body.dragging { cursor: grabbing; }
canvas { display: block; }
#hud {
    position: fixed; top: 12px; left: 12px; color: #889; font-size: 12px;
    pointer-events: none; line-height: 1.6;
}
#controls {
    position: fixed; top: 12px; right: 12px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end;
}
#controls button {
    background: rgba(20,20,50,0.8); border: 1px solid #335; color: #8af;
    padding: 6px 12px; font-family: monospace; font-size: 11px; cursor: pointer;
    border-radius: 3px; white-space: nowrap;
}
#controls button:hover { background: rgba(40,40,80,0.9); border-color: #66f; }
#controls button.active { background: rgba(50,50,120,0.9); border-color: #88f; color: #bdf; }
#info-bar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 0; overflow: hidden;
    background: rgba(8,8,25,0.95); border-top: 1px solid #223;
    transition: height 0.3s ease; padding: 0 20px;
}
#info-bar.open { height: 180px; padding: 16px 20px; }
#info-bar.tall { height: 260px; padding: 16px 20px; }
#info-bar h2 { color: #8af; font-size: 15px; margin-bottom: 8px; font-weight: normal; }
#info-bar .row { display: flex; gap: 24px; font-size: 12px; line-height: 1.8; }
#info-bar .row .col { min-width: 140px; }
#info-bar .label { color: #557; }
#info-bar .close {
    position: absolute; top: 10px; right: 16px; background: none; border: none;
    color: #557; font-size: 16px; cursor: pointer; font-family: monospace;
}
#info-bar .close:hover { color: #aaf; }
#info-bar .enter-btn {
    display: inline-block; margin-top: 8px; padding: 4px 10px; background: rgba(40,40,100,0.8);
    border: 1px solid #448; color: #8af; cursor: pointer; border-radius: 3px; font-family: monospace; font-size: 11px;
}
#info-bar .enter-btn:hover { background: rgba(60,60,140,0.9); border-color: #66f; }
#portrait { position: absolute; top: 16px; right: 50px; }
#portrait-img { position: absolute; top: 16px; right: 50px; width: 120px; height: 120px;
    object-fit: cover; border-radius: 4px; display: none; }
#hover-tip {
    position: fixed; z-index: 25; pointer-events: none;
    background: rgba(10,10,30,0.9); border: 1px solid rgba(80,100,200,0.3);
    border-radius: 5px; padding: 4px 10px; font-size: 11px; color: #aaccff;
    opacity: 0; transition: opacity 0.12s; white-space: nowrap;
}
#hover-tip.visible { opacity: 1; }
#hint {
    position: fixed; bottom: 12px; left: 12px; color: #445; font-size: 11px;
    pointer-events: none; transition: opacity 0.3s;
}
.lifeform { color: #6b8; font-style: italic; margin-top: 4px; }
#solar-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: none; z-index: 1;
}
#solar-canvas.active { display: block; }
</style>
</head>
<body>

<div id="hud"></div>
<div id="controls"></div>
<div id="hover-tip"></div>
<div id="info-bar">
    <button class="close" onclick="closeInfo()">&times;</button>
    <canvas id="portrait" width="120" height="120"></canvas>
    <img id="portrait-img" />
    <h2 id="info-name"></h2>
    <div class="row" id="info-body"></div>
</div>
<div id="hint">scroll to zoom · drag to orbit · click a galaxy</div>
<canvas id="solar-canvas"></canvas>

const seen = new Set();
const uniqueGalaxies = galaxies.filter(g => { if (seen.has(g.name)) return false; seen.add(g.name); return true; });

// =====================================================
// CONVERT RA/DEC/DIST → 3D POSITIONS
// =====================================================
// Use log-compressed distance so Local Group isn't crushed against origin
// and distant galaxies (Cartwheel 489 Mly) aren't infinitely far
const DIST_SCALE = 12; // scene units spread
function distToScene(mly) {
    if (mly <= 0) return 0;
    return Math.log10(mly + 1) * DIST_SCALE;
}
function sceneToDist(s) { return Math.pow(10, s / DIST_SCALE) - 1; }

uniqueGalaxies.forEach(g => {
    const raDeg = g.ra * 15; // hours → degrees
    const raRad = raDeg * Math.PI / 180;
    const decRad = g.dec * Math.PI / 180;
    const r = distToScene(g.dist);
    // Standard spherical → cartesian (astronomical convention)
    g.pos = new THREE.Vector3(
        r * Math.cos(decRad) * Math.cos(raRad),
        r * Math.sin(decRad),
        r * Math.cos(decRad) * Math.sin(raRad)
    );
    g.sceneRadius = Math.max(0.15, Math.min(1.2, 1.0 / (0.5 + Math.log10(Math.max(0.1, g.dist) + 1))));
});

const milkyWay = uniqueGalaxies.find(g => g.name === "Milky Way");

// =====================================================
// COLOR HELPERS
// =====================================================
function galaxyColor(g) {
    const t = g.type.toLowerCase();
    if (t.includes('elliptical') || t.includes('e0') || t.includes('e1') || t.includes('e2') || t.includes('e3') || t.includes('e5') || t.includes('cd')) return '#ffcc88';
    if (t.includes('lenticular') || t.includes('s0')) return '#ddbb99';
    if (t.includes('irregular') || t.includes('irr')) return '#88ccff';
    if (t.includes('starburst')) return '#ff8888';
    if (t.includes('seyfert')) return '#cc88ff';
    if (t.includes('merg') || t.includes('interact') || t.includes('ring')) return '#ff88cc';
    return '#aaccff';
}
function lightenColor(hex, amt) {
    let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    r = Math.min(255, r + amt); g = Math.min(255, g + amt); b = Math.min(255, b + amt);
    return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

// =====================================================
// GLOW TEXTURE
// =====================================================
function makeGlowTexture() {
    const c = document.createElement('canvas'); c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.15, 'rgba(255,255,255,0.6)');
    g.addColorStop(0.4, 'rgba(255,255,255,0.15)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
    return new THREE.CanvasTexture(c);
}

// =====================================================
// VIEW MODE STATE
// =====================================================
let viewMode = 'galaxies';
let showLabels = true, showRADecGrid = false, showMpcGrid = false;
let selectedObj = null;

// =====================================================
// 3D GALAXY VIEW (Three.js)
// =====================================================
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 800);
const scene = new THREE.Scene();

// Navigator state
const nav = {
    target: new THREE.Vector3(0, 0, 0),
    distance: 30, smoothZoom: 30,
    yaw: -0.3, pitch: -0.3,
    targetYaw: -0.3, targetPitch: -0.3,
    _flyTarget: null, _flyDist: null, _flyPitch: null,
    minDist: 0.5, maxDist: 120,

    flyTo(pos, dist, pitch) {
        this._flyTarget = pos.clone();
        this._flyDist = dist;
        this.smoothZoom = dist;
        if (pitch !== undefined) this._flyPitch = pitch;
    },
    update() {
        if (this._flyTarget) {
            this.target.lerp(this._flyTarget, 0.06);
            if (this.target.distanceTo(this._flyTarget) < 0.01) this._flyTarget = null;
        }
        if (this._flyPitch !== null) {
            this.targetPitch += (this._flyPitch - this.targetPitch) * 0.06;
            if (Math.abs(this.targetPitch - this._flyPitch) < 0.001) this._flyPitch = null;
        }
        this.distance += (this.smoothZoom - this.distance) * 0.08;
        this.targetPitch = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, this.targetPitch));
        this.yaw += (this.targetYaw - this.yaw) * 0.12;
        this.pitch += (this.targetPitch - this.pitch) * 0.12;
        const cx = this.target.x + Math.cos(this.pitch) * Math.sin(this.yaw) * this.distance;
        const cy = this.target.y + Math.sin(this.pitch) * this.distance;
        const cz = this.target.z + Math.cos(this.pitch) * Math.cos(this.yaw) * this.distance;
        camera.position.set(cx, cy, cz);
        camera.lookAt(this.target);
    }
};

renderer.domElement.addEventListener('wheel', e => {
    e.preventDefault();

    if (Math.abs(e.deltaX) > Math.abs(e.deltaY) + 2) {
        const right = new THREE.Vector3(Math.cos(nav.yaw), 0, -Math.sin(nav.yaw));
        nav.target.addScaledVector(right, e.deltaX * 0.002 * (nav.distance * 0.03 + 0.1));
        return;
    }
    const factor = 1 + dy * 0.0012;
    nav.smoothZoom = Math.max(nav.minDist, Math.min(nav.maxDist, nav.smoothZoom * factor));

// Touch
let touchDist0 = 0, touchZoom0 = 0;
renderer.domElement.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
        dragging3d = true; dragMoved3d = false;
        dragStart3d = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    } else if (e.touches.length === 2) {
        dragging3d = false;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchDist0 = Math.sqrt(dx*dx + dy*dy);
        touchZoom0 = nav.smoothZoom;
    }
});
renderer.domElement.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && dragging3d) {
        const dx = e.touches[0].clientX - dragStart3d.x, dy = e.touches[0].clientY - dragStart3d.y;
        if (Math.abs(dx) + Math.abs(dy) > 3) dragMoved3d = true;
        nav.targetYaw -= dx * 0.005;
        nav.targetPitch += dy * 0.005;
        dragStart3d = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const d = Math.sqrt(dx*dx + dy*dy);
        nav.smoothZoom = Math.max(nav.minDist, Math.min(nav.maxDist, touchZoom0 * (touchDist0 / Math.max(d, 1))));

}, {passive: false});
renderer.domElement.addEventListener('touchend', () => { dragging3d = false; });

// Click
let clickTimer3d = null;
renderer.domElement.addEventListener('click', e => {
    if (dragMoved3d) return;
    if (clickTimer3d) clearTimeout(clickTimer3d);
    const ex = e.clientX, ey = e.clientY;
    clickTimer3d = setTimeout(() => {
        mouse.x = (ex / window.innerWidth) * 2 - 1;
        mouse.y = -(ey / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(clickableObjects, false);
        if (hits.length > 0) {
            let obj = hits[0].object;
            while (obj && !obj.userData.galaxy) obj = obj.parent;
            if (obj && obj.userData.galaxy) {
                const g = obj.userData.galaxy;
                if (g.name === 'Milky Way') {
                    initSolarView();
                    return;
                }
                selectedObj = g;
                showInfo(g);
                nav.flyTo(g.pos, Math.max(2, nav.distance * 0.6));
            }
        } else {
            closeInfo();
        }
    }, 250);
});
renderer.domElement.addEventListener('dblclick', e => {
    if (clickTimer3d) { clearTimeout(clickTimer3d); clickTimer3d = null; }
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const pt = new THREE.Vector3();

        nav.flyTo(pt, nav.distance);

});

const solarCanvas = document.getElementById('solar-canvas');
const sctx = solarCanvas.getContext('2d');
let sW, sH, sCamX = 350, sCamY = 0, sZoom = 0.9;
let sTargetX = 350, sTargetY = 0, sTargetZoom = 0.9;
let sDragging = false, sDragStart = {x:0,y:0}, sDragMoved = false;
let sMouseX = 0, sMouseY = 0, sHovered = null;

function sResize() { sW = solarCanvas.width = innerWidth; sH = solarCanvas.height = innerHeight; }

solarCanvas.addEventListener('mousedown', e => {
    sDragging = true; sDragMoved = false;
    sDragStart = {x: e.clientX, y: e.clientY};
    document.body.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
    sMouseX = e.clientX; sMouseY = e.clientY;
    if (viewMode === 'solar' && sDragging) {
        const dx = e.clientX - sDragStart.x, dy = e.clientY - sDragStart.y;
        if (Math.abs(dx) + Math.abs(dy) > 3) sDragMoved = true;
        sCamX -= dx / sZoom; sCamY -= dy / sZoom;
        sTargetX = sCamX; sTargetY = sCamY;
        sDragStart = {x: e.clientX, y: e.clientY};
    }
});
window.addEventListener('mouseup', () => { sDragging = false; document.body.classList.remove('dragging'); });
solarCanvas.addEventListener('click', e => {
    if (sDragMoved) return;
    if (sHovered) { selectedObj = sHovered; showInfo(sHovered); }
    else { closeInfo(); }
});
solarCanvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 0.9 : 1.1;
    const wx = sCamX + (sMouseX - sW/2) / sZoom;
    const wy = sCamY + (sMouseY - sH/2) / sZoom;
    sTargetZoom = Math.max(0.08, Math.min(8, sZoom * factor));
    sTargetX = wx - (sMouseX - sW/2) / sTargetZoom;
    sTargetY = wy - (sMouseY - sH/2) / sTargetZoom;
}, {passive: false});

function lerp(a, b, t) { return a + (b - a) * t; }

function drawSolarSystem() {
    sCamX = lerp(sCamX, sTargetX, 0.12);
    sCamY = lerp(sCamY, sTargetY, 0.12);
    sZoom = lerp(sZoom, sTargetZoom, 0.12);

    sctx.fillStyle = '#050510'; sctx.fillRect(0, 0, sW, sH);

    const centerX = 0, centerY = 0;
    // Orbit lines
    for (const p of planets) {
        if (p.dist === 0) continue;
        const sx = (centerX - sCamX) * sZoom + sW/2;
        const sy = (centerY - sCamY) * sZoom + sH/2;
        sctx.beginPath(); sctx.arc(sx, sy, p.dist * sZoom, 0, Math.PI * 2);
        sctx.strokeStyle = 'rgba(40,50,80,0.3)'; sctx.lineWidth = 0.5; sctx.stroke();
    }

    sHovered = null;
    let closest = Infinity;
    const time = Date.now() * 0.0001;

    for (const p of planets) {
        let px, py;
        if (p.dist === 0) { px = centerX; py = centerY; }
        else {
            const speed = 1 / Math.sqrt(p.dist);
            const angle = time * speed + p.dist;
            px = centerX + Math.cos(angle) * p.dist;
            py = centerY + Math.sin(angle) * p.dist;
        }
        const sx = (px - sCamX) * sZoom + sW/2;
        const sy = (py - sCamY) * sZoom + sH/2;
        const r = Math.max(3, p.radius * sZoom * 0.15);
        const isSel = p === selectedObj;

        if (p.name === 'Sun') {
            const glow = sctx.createRadialGradient(sx, sy, 0, sx, sy, r * 3);
            glow.addColorStop(0, '#ffdd4466'); glow.addColorStop(0.5, '#ff880022'); glow.addColorStop(1, 'transparent');
            sctx.fillStyle = glow; sctx.fillRect(sx - r*3, sy - r*3, r*6, r*6);
        }
        if (p.rings) {
            sctx.beginPath(); sctx.ellipse(sx, sy, r*2, r*0.5, 0.3, 0, Math.PI*2);
            sctx.strokeStyle = '#e8d5a044'; sctx.lineWidth = Math.max(1, r*0.3); sctx.stroke();
        }
        const grad = sctx.createRadialGradient(sx - r*0.3, sy - r*0.3, 0, sx, sy, r);
        grad.addColorStop(0, lightenColor(p.color, 30)); grad.addColorStop(1, p.color);
        sctx.beginPath(); sctx.arc(sx, sy, r, 0, Math.PI*2);
        sctx.fillStyle = isSel ? '#fff' : grad; sctx.fill();
        if (isSel) {
            sctx.beginPath(); sctx.arc(sx, sy, r+5, 0, Math.PI*2);
            sctx.strokeStyle = p.color + '88'; sctx.lineWidth = 1.5; sctx.stroke();
        }
        if (showLabels && sZoom > 0.3) {
            sctx.fillStyle = '#8899aa'; sctx.font = `${Math.min(12, 10*sZoom)}px monospace`;
            sctx.fillText(p.name, sx + r + 5, sy + 3);
        }
        const dx = sMouseX - sx, dy = sMouseY - sy;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < Math.max(r+5, 15) && d < closest) { closest = d; sHovered = p; }
    }
    if (sHovered && !sDragging) solarCanvas.style.cursor = 'pointer';
    else if (!sDragging) solarCanvas.style.cursor = 'grab';
    document.getElementById('hud').innerHTML = `Solar System · zoom ${sZoom.toFixed(2)}x`;
}

// Galaxy photo URLs — add entries here as images are uploaded
const GALAXY_IMAGES = {
    'Andromeda (M31)': 'https://www.cloudautomat.net/images/galaxies/andromeda.png',
    // 'Whirlpool Galaxy': 'https://www.cloudautomat.net/images/galaxies/whirlpool.png',
    // 'Triangulum Galaxy': 'https://www.cloudautomat.net/images/galaxies/triangulum.png',
};

const imageCache = {};

function showGalaxyPhoto(g, fallback) {
    const url = GALAXY_IMAGES[g.name];
    if (!url) { fallback(); return; }

    if (imageCache[url] === 'failed') { fallback(); return; }
    if (imageCache[url] === 'loaded') {
        portrait.style.display = 'none';
        portraitImg.src = url;
        portraitImg.style.display = 'block';
        return;
    }

    // Try loading
    const img = new Image();
    // No crossOrigin needed — display only, no canvas pixel access
    img.onload = () => {
        imageCache[url] = 'loaded';
        portrait.style.display = 'none';
        portraitImg.src = url;
        portraitImg.style.display = 'block';
    };
    img.onerror = () => {
        imageCache[url] = 'failed';
        fallback();
    };
    img.src = url;
    // Show procedural while loading
    fallback();
}

function drawGalaxyPortrait(g) {
    const w = 120, h = 120;
    pctx.clearRect(0, 0, w, h);
    const cx = w/2, cy = h/2;
    const t = g.type.toLowerCase();
    const color = galaxyColor(g);
    let seed = 0;
    for (let i = 0; i < g.name.length; i++) seed = ((seed << 5) - seed + g.name.charCodeAt(i)) | 0;
    const rng = () => { seed = (seed * 16807 + 0) % 2147483647; return (seed & 0x7fffffff) / 2147483647; };

    if (t.includes('spiral') || t.includes('sb') || t.includes('sa')) {
        const arms = 2 + Math.floor(rng() * 2);
        const barred = t.includes('bar') || t.includes('sb');
        const cg = pctx.createRadialGradient(cx, cy, 0, cx, cy, 15);
        cg.addColorStop(0, '#ffe8cc'); cg.addColorStop(0.5, color + '88'); cg.addColorStop(1, 'transparent');
        pctx.fillStyle = cg; pctx.fillRect(0, 0, w, h);
        if (barred) {
            pctx.save(); pctx.translate(cx, cy); pctx.rotate(rng()*Math.PI);
            pctx.fillStyle = color + '44'; pctx.fillRect(-20, -3, 40, 6); pctx.restore();
        }
        for (let a = 0; a < arms; a++) {
            const startAngle = (a / arms) * Math.PI * 2;
            pctx.beginPath();
            for (let t2 = 0; t2 < 6; t2 += 0.1) {
                const angle = startAngle + t2 * 0.8;
                const r2 = 5 + t2 * 7;
                const j = rng() * 2 - 1;
                const x = cx + Math.cos(angle)*r2 + j, y = cy + Math.sin(angle)*r2*0.6 + j;
                if (t2 === 0) pctx.moveTo(x, y); else pctx.lineTo(x, y);
            }
            pctx.strokeStyle = color + '66'; pctx.lineWidth = 3 + rng()*2; pctx.stroke();
        }
        for (let i = 0; i < 60; i++) {
            const a = rng()*Math.PI*2, r2 = rng()*45;
            pctx.fillStyle = color + (Math.floor(rng()*80+20)).toString(16);
            pctx.fillRect(cx+Math.cos(a)*r2, cy+Math.sin(a)*r2*0.6, 1, 1);
        }
    } else if (t.includes('elliptical') || t.includes('e0') || t.includes('cd')) {
        const stretch = 0.6 + rng()*0.4;
        for (let r2 = 40; r2 > 0; r2 -= 2) {
            const alpha = (0.02 + (40-r2)/40*0.15).toFixed(2);
            pctx.beginPath(); pctx.ellipse(cx, cy, r2, r2*stretch, rng()*0.3, 0, Math.PI*2);
            pctx.fillStyle = color + Math.floor(parseFloat(alpha)*255).toString(16).padStart(2,'0');
            pctx.fill();
        }
    } else if (t.includes('lenticular') || t.includes('s0')) {
        const cg = pctx.createRadialGradient(cx, cy, 0, cx, cy, 35);
        cg.addColorStop(0, '#ffe8cc88'); cg.addColorStop(0.4, color+'44'); cg.addColorStop(1, 'transparent');
        pctx.fillStyle = cg; pctx.fillRect(0, 0, w, h);
        pctx.beginPath(); pctx.ellipse(cx, cy, 40, 8, rng()*0.5, 0, Math.PI*2);
        pctx.fillStyle = color+'33'; pctx.fill();
    } else if (t.includes('irregular') || t.includes('irr')) {
        for (let i = 0; i < 120; i++) {
            const x = cx+(rng()-0.5)*60, y = cy+(rng()-0.5)*50, s = 1+rng()*3;
            pctx.fillStyle = [color, '#88ccff', '#ff8888', '#aaddff'][Math.floor(rng()*4)] + '55';
            pctx.fillRect(x, y, s, s);
        }
    } else if (t.includes('merg') || t.includes('ring')) {
        if (t.includes('ring')) {
            pctx.beginPath(); pctx.arc(cx, cy, 30, 0, Math.PI*2);
            pctx.strokeStyle = color+'66'; pctx.lineWidth = 6; pctx.stroke();
        } else {
            for (const off of [[-15,-8],[15,8]]) {
                const cg = pctx.createRadialGradient(cx+off[0], cy+off[1], 0, cx+off[0], cy+off[1], 20);
                cg.addColorStop(0, '#ffe8cc66'); cg.addColorStop(1, 'transparent');
                pctx.fillStyle = cg; pctx.fillRect(cx+off[0]-20, cy+off[1]-20, 40, 40);
            }
        }
    } else {
        const cg = pctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
        cg.addColorStop(0, '#ff888866'); cg.addColorStop(0.5, color+'33'); cg.addColorStop(1, 'transparent');
        pctx.fillStyle = cg; pctx.fillRect(0, 0, w, h);
    }
}

function drawPlanetPortrait(p) {
    const w = 120, h = 120;
    pctx.clearRect(0, 0, w, h);
    const cx = w/2, cy = h/2, r = Math.min(40, p.radius * 3);
    if (p.name === 'Sun') {
        const g = pctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        g.addColorStop(0, '#fff8e0'); g.addColorStop(0.4, '#ffdd44'); g.addColorStop(0.8, '#ff8800'); g.addColorStop(1, 'transparent');
        pctx.fillStyle = g; pctx.fillRect(0, 0, w, h);
        return;
    }
    const g = pctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r);
    g.addColorStop(0, lightenColor(p.color, 40)); g.addColorStop(1, p.color);
    pctx.beginPath(); pctx.arc(cx, cy, r, 0, Math.PI*2); pctx.fillStyle = g; pctx.fill();
    if (['Jupiter','Saturn','Uranus','Neptune'].includes(p.name)) {
        for (let i = -3; i <= 3; i++) {
            pctx.beginPath();
            const by = cy + i * r * 0.22;
            pctx.moveTo(cx-r, by); pctx.quadraticCurveTo(cx, by + (i%2 ? 2 : -2), cx+r, by);
            pctx.strokeStyle = (i%2 ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.1)');
            pctx.lineWidth = r * 0.12; pctx.stroke();
        }
    }
    if (p.rings) {
        pctx.beginPath(); pctx.ellipse(cx, cy, r*1.8, r*0.4, 0, 0, Math.PI*2);
        pctx.strokeStyle = '#e8d5a066'; pctx.lineWidth = 5; pctx.stroke();
    }
}

// =====================================================
// INFO PANEL
// =====================================================
function showInfo(obj) {
    const bar = document.getElementById('info-bar');
    if (viewMode === 'galaxies') {
        const mpc = (obj.dist / 3.2616).toFixed(obj.dist < 10 ? 2 : 1);
        document.getElementById('info-name').textContent = obj.name;
        document.getElementById('info-body').innerHTML = `
            <div class="col"><span class="label">type:</span> ${obj.type}<br>
            <span class="label">distance:</span> ${obj.dist === 0 ? 'here' : obj.dist + ' Mly (' + mpc + ' Mpc)'}<br>
            <span class="label">app. mag:</span> ${obj.mag || 'n/a'}</div>
            <div class="col"><span class="label">size:</span> ${obj.size}<br>
            <span class="label">group:</span> ${obj.group}</div>
            <div class="col" style="max-width:280px"><span class="label">notes:</span> ${obj.notes}
            ${obj.name === 'Milky Way' ? '<br><button class="enter-btn" onclick="initSolarView()">enter solar system &rarr;</button>' : ''}</div>`;
        bar.className = 'open';
        portraitImg.style.display = 'none';
        portrait.style.display = 'block';
        showGalaxyPhoto(obj, () => drawGalaxyPortrait(obj));
    } else {
        document.getElementById('info-name').textContent = obj.name;
        const distAU = obj.dist > 0 ? (obj.dist / 60 * 0.387).toFixed(2) : '—';
        document.getElementById('info-body').innerHTML = `
            <div class="col"><span class="label">dist from Sun:</span> ${obj.dist === 0 ? 'center' : distAU + ' AU (approx)'}<br>
            <span class="label">facts:</span> ${obj.facts}</div>
            <div class="col" style="max-width:350px"><div class="lifeform"><span class="label" style="color:#557">native lifeform (totally real):</span><br>${obj.lifeform}</div></div>`;
        bar.className = 'open tall';
        portraitImg.style.display = 'none';
        portrait.style.display = 'block';
        drawPlanetPortrait(obj);
    }
    document.getElementById('hint').style.opacity = '0';
    portrait.style.display = 'block';
}

function closeInfo() {
    document.getElementById('info-bar').className = '';
    selectedObj = null;
    portrait.style.display = 'none';
    portraitImg.style.display = 'none';
}

// =====================================================
// VIEW SWITCHING
// =====================================================
function initGalaxyView() {
    viewMode = 'galaxies';
    solarCanvas.classList.remove('active');
    renderer.domElement.style.display = 'block';
    nav.flyTo(new THREE.Vector3(0, 0, 0), 30, -0.3);
    selectedObj = null; closeInfo();
    document.getElementById('hint').textContent = 'scroll to zoom · drag to orbit · click a galaxy · click Milky Way to enter';
    document.getElementById('hint').style.opacity = '1';
    updateControls();
}

function initSolarView() {
    viewMode = 'solar';
    solarCanvas.classList.add('active');
    renderer.domElement.style.display = 'none';
    sResize();
    sTargetX = sCamX = 350; sTargetY = sCamY = 0; sTargetZoom = sZoom = 0.9;
    selectedObj = null; closeInfo();
    document.getElementById('hint').textContent = 'scroll to zoom · drag to pan · click a planet';
    document.getElementById('hint').style.opacity = '1';
    updateControls();
}

function updateControls() {
    const c = document.getElementById('controls');
    if (viewMode === 'galaxies') {
        c.innerHTML = `
            <button onclick="nav.flyTo(new THREE.Vector3(0,0,0), 30, -0.3)">recenter</button>
            <button onclick="toggleLabels()" id="btn-labels">labels</button>
            <button onclick="toggleRADec()" id="btn-radec">RA/Dec grid</button>
            <button onclick="toggleMpc()" id="btn-mpc">Mpc grid</button>`;
    } else {
        c.innerHTML = `
            <button onclick="initGalaxyView()">back to galaxies</button>
            <button onclick="sTargetX=350;sTargetY=0;sTargetZoom=0.9">recenter</button>
            <button onclick="toggleLabels()" id="btn-labels">labels</button>`;
    }
    if (showLabels) document.getElementById('btn-labels')?.classList.add('active');
    if (showRADecGrid) document.getElementById('btn-radec')?.classList.add('active');
    if (showMpcGrid) document.getElementById('btn-mpc')?.classList.add('active');
}

function toggleLabels() {
    showLabels = !showLabels;
    galaxyMeshes.forEach(gm => {
        gm.children.forEach(c => { if (c.userData.isLabel) c.visible = showLabels; });
    });
    updateControls();
}
function toggleRADec() { showRADecGrid = !showRADecGrid; raDecGridGroup.visible = showRADecGrid; updateControls(); }
function toggleMpc() { showMpcGrid = !showMpcGrid; mpcGridGroup.visible = showMpcGrid; updateControls(); }

// Escape
window.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeInfo();
});

// =====================================================
// MAIN LOOP
// =====================================================
function animate() {
    requestAnimationFrame(animate);

    if (viewMode === 'galaxies') {
        nav.update();

        // Billboard MW ring
        galaxyMeshes.forEach(gm => {
            if (gm.userData.ring) {
                gm.userData.ring.lookAt(camera.position);
                gm.userData.ring.material.opacity = 0.2 + Math.sin(Date.now() * 0.003) * 0.1;
            }
            // Scale labels to stay readable
            gm.children.forEach(c => {
                if (c.userData.isLabel) {
                    const d = camera.position.distanceTo(gm.position);
                    const s = Math.max(0.3, Math.min(1.5, d * 0.04));
                    c.scale.set(s * 2.5, s * 0.5, 1);
                }
            });
        });

        // HUD
        const dist = nav.target.length();
        const mly = sceneToDist(dist);
        document.getElementById('hud').innerHTML =
            `${uniqueGalaxies.length} galaxies · ` +
            (mly < 1 ? `${(mly*1000).toFixed(0)} kly from home` : `${mly.toFixed(1)} Mly from home`) +
            ` · zoom ${nav.distance.toFixed(1)}`;

        renderer.render(scene, camera);
    } else {
        drawSolarSystem();
    }
}

// =====================================================
// INIT
// =====================================================
initGalaxyView();
animate();
</script>
</body>
</html>
